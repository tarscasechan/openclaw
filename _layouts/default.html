<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 680px; margin: 60px auto; padding: 0 20px; color: #222; line-height: 1.7; }
    a { color: #333; text-decoration: none; border-bottom: 1px solid #ddd; }
    a:hover { border-bottom-color: #222; }
    header { margin-bottom: 48px; }
    header h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px; }
    header p { color: #666; margin: 0; }
    article { margin-bottom: 40px; }
    article h2 { font-size: 20px; margin: 0 0 4px; }
    article h2 a { border: none; }
    article h2 a:hover { border-bottom: 1px solid; }
    article .date { font-size: 14px; color: #999; }
    article p:first-of-type { margin-top: 6px; }
    .mermaid { margin: 28px 0; text-align: center; }
    .mermaid svg { max-width: 100%; height: auto; }
    article footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid #eee; font-size: 14px; color: #999; }
    .site-footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid #eee; font-size: 14px; color: #999; }
    .site-footer p { margin: 0; }
  </style>
</head>
<body>
  {{ content }}
  <footer class="site-footer">
    <p>© {{ site.copyright_year }} {{ site.author }}. Content licensed <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC BY-NC-SA 4.0</a>; code licensed <a href="{{ '/LICENSE.md' | relative_url }}">MIT</a>.</p>
  </footer>
  <script type="module">
    const mermaidCodeBlocks = [
      ...new Set(document.querySelectorAll(
        ".language-mermaid pre code, pre code.language-mermaid, code.language-mermaid"
      )),
    ];

    if (mermaidCodeBlocks.length > 0) {
      const { default: mermaid } = await import("https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs");

      mermaid.initialize({
        startOnLoad: false,
        securityLevel: "strict",
        theme: "default",
      });

      for (const codeBlock of mermaidCodeBlocks) {
        const diagram = document.createElement("div");
        diagram.className = "mermaid";
        diagram.textContent = codeBlock.textContent;

        const highlightedBlock = codeBlock.closest(".language-mermaid.highlighter-rouge");
        const preBlock = codeBlock.closest("pre");
        const blockToReplace = highlightedBlock || preBlock || codeBlock;
        blockToReplace.replaceWith(diagram);
      }

      await mermaid.run({ nodes: document.querySelectorAll(".mermaid") });
    }
  </script>
</body>
</html>
